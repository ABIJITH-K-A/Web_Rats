services:
  - type: web
    name: tnwebrats-backend
    env: node
    plan: free
    region: oregon 
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: tnwebrats-redis
          property: connectionString
      - fromGroup: tnwebrats-secrets

  - type: redis
    name: tnwebrats-redis
    plan: free
    region: oregon
